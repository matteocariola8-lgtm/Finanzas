[build]
  publish = "."

[[redirects]]
  from    = "https://www.sagomafinanziaria.it/*"
  to      = "https://sagomafinanziaria.it/:splat"
  status  = 301
  force   = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
